name: ID Daily Business Review

on:
  schedule:
   -cron: '0 13 * * *'    # 8am CT = 1pm UTC, daily
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run report
        env:
          LOOKER_BASE_URL:      ${{ secrets.LOOKER_BASE_URL }}
          LOOKER_CLIENT_ID:     ${{ secrets.LOOKER_CLIENT_ID }}
          LOOKER_CLIENT_SECRET: ${{ secrets.LOOKER_CLIENT_SECRET }}
          SLACK_WEBHOOK_URL:    ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_READ_TOKEN:     ${{ secrets.SLACK_READ_TOKEN }}
          TRIGGERED_BY:         ${{ github.event_name }}
          ID_HUBSPOT_TOKEN:     ${{ secrets.ID_HUBSPOT_TOKEN }}
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
        run: python report.py
